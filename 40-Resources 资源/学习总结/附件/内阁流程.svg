<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">AI 内阁多 Agent 治理层架构图</title>
  <desc id="desc">展示从人类决策者、三省、政事堂、五部、监督层到确认归档的多 Agent 治理流程。</desc>
  <defs>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #526071; }
      .layer { fill: #f6f8fb; stroke: #d9e1ec; stroke-width: 2; }
      .node { rx: 16; ry: 16; stroke-width: 2.5; filter: url(#shadow); }
      .node-title { font-size: 23px; font-weight: 700; }
      .node-sub { font-size: 15px; fill: #445469; }
      .small { font-size: 14px; fill: #566579; }
      .arrow { fill: none; stroke: #6f7f93; stroke-width: 3; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #9aa8ba; stroke-width: 2.5; stroke-dasharray: 8 8; marker-end: url(#arrow-soft); }
      .decision { fill: #fff6df; stroke: #d39b24; }
      .search { fill: #eaf4ff; stroke: #3483d1; }
      .review { fill: #eef7ed; stroke: #4f9b57; }
      .execute { fill: #fff0ec; stroke: #d7664c; }
      .ministry { fill: #f5f1ff; stroke: #8066d9; }
      .audit { fill: #fff4f7; stroke: #cc5d7a; }
      .archive { fill: #eef8f6; stroke: #3f9b8f; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#162033" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6f7f93"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9aa8ba"/>
    </marker>
  </defs>

  <rect width="1400" height="980" fill="#ffffff"/>
  <text x="70" y="64" class="title">AI 内阁：多 Agent 系统的治理层</text>
  <text x="70" y="96" class="subtitle">搜索、审核、执行三权分立；五部专业化并行；御史台、门下省、锦衣卫构成独立审核链。</text>

  <rect x="50" y="130" width="1300" height="100" class="layer"/>
  <text x="76" y="160" class="small">L0 决策层</text>
  <rect x="545" y="152" width="310" height="56" class="node decision"/>
  <text x="630" y="186" class="node-title">人类决策者</text>

  <rect x="50" y="255" width="1300" height="150" class="layer"/>
  <text x="76" y="285" class="small">L1 三省：分权准备</text>
  <rect x="150" y="305" width="280" height="72" class="node search"/>
  <text x="216" y="337" class="node-title">中书省</text>
  <text x="206" y="362" class="node-sub">唯一搜索，只搜集不下结论</text>
  <rect x="560" y="305" width="280" height="72" class="node review"/>
  <text x="626" y="337" class="node-title">门下省</text>
  <text x="638" y="362" class="node-sub">预审方案，一票驳回</text>
  <rect x="970" y="305" width="280" height="72" class="node execute"/>
  <text x="1036" y="337" class="node-title">尚书省</text>
  <text x="1034" y="362" class="node-sub">编排流程，派发五部</text>

  <rect x="50" y="430" width="1300" height="100" class="layer"/>
  <text x="76" y="460" class="small">L2 政事堂 R1</text>
  <rect x="430" y="456" width="540" height="50" class="node decision"/>
  <text x="524" y="488" class="node-title">三省联席方案审定：全通过才放行</text>

  <rect x="50" y="555" width="1300" height="160" class="layer"/>
  <text x="76" y="585" class="small">L3 五部：专业化并行执行</text>
  <rect x="95" y="620" width="210" height="64" class="node ministry"/>
  <text x="143" y="649" class="node-title">兵部</text>
  <text x="135" y="672" class="node-sub">定性分析</text>
  <rect x="335" y="620" width="210" height="64" class="node ministry"/>
  <text x="383" y="649" class="node-title">户部</text>
  <text x="375" y="672" class="node-sub">定量建模</text>
  <rect x="575" y="620" width="210" height="64" class="node ministry"/>
  <text x="623" y="649" class="node-title">礼部</text>
  <text x="615" y="672" class="node-sub">最终报告</text>
  <rect x="815" y="620" width="210" height="64" class="node ministry"/>
  <text x="863" y="649" class="node-title">工部</text>
  <text x="847" y="672" class="node-sub">可视化与模板</text>
  <rect x="1055" y="620" width="250" height="64" class="node ministry"/>
  <text x="1118" y="649" class="node-title">文牍部</text>
  <text x="1108" y="672" class="node-sub">版本、格式、归档包</text>

  <rect x="50" y="740" width="1300" height="112" class="layer"/>
  <text x="76" y="770" class="small">L4-L5 成品审核与终巡</text>
  <rect x="285" y="786" width="250" height="52" class="node audit"/>
  <text x="329" y="817" class="node-title">御史台审计</text>
  <rect x="575" y="786" width="250" height="52" class="node review"/>
  <text x="619" y="817" class="node-title">门下省复核</text>
  <rect x="865" y="786" width="250" height="52" class="node audit"/>
  <text x="909" y="817" class="node-title">锦衣卫终巡</text>

  <rect x="50" y="877" width="1300" height="70" class="layer"/>
  <text x="76" y="907" class="small">L6 确认与记录</text>
  <rect x="410" y="894" width="250" height="40" class="node decision"/>
  <text x="455" y="920" class="node-title">人类确认</text>
  <rect x="740" y="894" width="250" height="40" class="node archive"/>
  <text x="794" y="920" class="node-title">吏部归档</text>

  <path d="M700 208 V292" class="arrow"/>
  <path d="M700 230 C700 260 290 270 290 305" class="arrow"/>
  <path d="M700 230 C700 260 1110 270 1110 305" class="arrow"/>
  <path d="M290 377 C290 430 700 420 700 456" class="arrow"/>
  <path d="M700 377 V456" class="arrow"/>
  <path d="M1110 377 C1110 430 700 420 700 456" class="arrow"/>
  <path d="M700 506 V610" class="arrow"/>
  <path d="M700 530 C700 585 200 585 200 620" class="arrow"/>
  <path d="M700 530 C700 585 440 585 440 620" class="arrow"/>
  <path d="M700 530 C700 585 920 585 920 620" class="arrow"/>
  <path d="M700 530 C700 585 1180 585 1180 620" class="arrow"/>
  <path d="M200 684 C200 735 410 740 410 786" class="arrow"/>
  <path d="M440 684 C440 735 700 740 700 786" class="arrow"/>
  <path d="M680 684 V786" class="arrow"/>
  <path d="M920 684 C920 735 700 740 700 786" class="arrow"/>
  <path d="M1180 684 C1180 735 990 740 990 786" class="arrow"/>
  <path d="M535 812 H575" class="dash"/>
  <path d="M825 812 H865" class="arrow"/>
  <path d="M990 838 C990 878 535 860 535 894" class="arrow"/>
  <path d="M660 914 H740" class="arrow"/>

  <text x="70" y="965" class="small">硬约束：创作者不做审核者；三省除政事堂外不直接通信；五部互不通信；任何驳回回到礼部独立返修。</text>
</svg>
